<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Ghost | Battle Log</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --void-black: #0a0a0f; --spectral-teal: #00f3ff; --bone-white: #e0e0e0; --glass-bg: rgba(19, 19, 31, 0.6); --glass-border: rgba(255, 255, 255, 0.08); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--void-black); color: var(--bone-white); min-height: 100vh; display: flex; }
        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); padding: 2rem 1.5rem; position: fixed; height: 100vh; }
        .logo { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--spectral-teal); margin-bottom: 3rem; display: flex; align-items: center; gap: 10px; }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-links li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #8888a0; text-decoration: none; border-radius: 12px; transition: all 0.3s; }
        .nav-links li a:hover, .nav-links li a.active { background: rgba(0, 243, 255, 0.1); color: var(--spectral-teal); border-left: 3px solid var(--spectral-teal); }
        .main-content { flex: 1; margin-left: 260px; padding: 2rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; text-align: center; }
        .stat-value { font-family: 'Rajdhani', sans-serif; font-size: 2.5rem; font-weight: 700; color: var(--spectral-teal); line-height: 1; }
        .stat-label { color: #8888a0; font-size: 0.9rem; margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .log-container { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; min-height: 300px; }
        .log-entry { padding: 1rem; border-bottom: 1px solid var(--glass-border); display: flex; gap: 1rem; align-items: center; }
        .log-entry:last-child { border-bottom: none; }
        .log-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: rgba(0, 243, 255, 0.1); color: var(--spectral-teal); }
        .empty-state { text-align: center; padding: 3rem; color: #666; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-ghost"></i><span>RPG Ghost</span></div>
        <ul class="nav-links">
            <li><a href="/dashboard"><i class="fa-solid fa-chart-pie"></i> Overview</a></li>
            <li><a href="/battle-log" class="active"><i class="fa-solid fa-khanda"></i> Battle Log</a></li>
            <li><a href="/inventory"><i class="fa-solid fa-sack-dollar"></i> Inventory</a></li>
            <li><a href="/quest-board"><i class="fa-solid fa-scroll"></i> Quest Board</a></li>
            <li><a href="/guild-hall"><i class="fa-solid fa-users"></i> Guild Hall</a></li>
            <li><a href="/settings"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 2rem;"><h1>Battle Statistics</h1></header>

        <div class="stats-grid" id="stats-container">
            <!-- Populated by JS -->
            <div class="stat-card"><div class="stat-value">-</div><div class="stat-label">Loading...</div></div>
        </div>

        <h2 style="margin-bottom: 1rem;">Recent Combat History</h2>
        <div class="log-container" id="log-container">
            <div class="empty-state"><i class="fa-solid fa-spinner fa-spin"></i> Consulting the spirits...</div>
        </div>
    </main>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const meRes = await fetch('/api/me');
        const me = await meRes.json();
        if (!me.logged_in) return window.location.href = '/';

        // Fetch Stats
        const statsRes = await fetch(`/api/battle-stats/${me.discord_id}`);
        const stats = await statsRes.json();

        document.getElementById('stats-container').innerHTML = `
            <div class="stat-card"><div class="stat-value">${stats.battles_won || 0}</div><div class="stat-label">Victories</div></div>
            <div class="stat-card"><div class="stat-value">${stats.battles_lost || 0}</div><div class="stat-label">Defeats</div></div>
            <div class="stat-card"><div class="stat-value">${stats.pvp_wins || 0}/${stats.pvp_losses || 0}</div><div class="stat-label">PvP W/L</div></div>
            <div class="stat-card"><div class="stat-value">${stats.world_boss_kills || 0}</div><div class="stat-label">Boss Kills</div></div>
            <div class="stat-card"><div class="stat-value">${(stats.xp || 0).toLocaleString()}</div><div class="stat-label">Total XP Earned</div></div>
        `;

        // Fetch Activity Log for combat history
        const actRes = await fetch(`/api/activity/${me.discord_id}`);
        const actData = await actRes.json();
        const logContainer = document.getElementById('log-container');
        
        const combatLogs = (actData.items || []).filter(i => 
            i.action.includes('battle') || i.action.includes('kill') || i.action.includes('pvp') || i.action.includes('boss')
        );

        if (combatLogs.length === 0) {
            logContainer.innerHTML = '<div class="empty-state">No recent battles found. Go hunt something!</div>';
        } else {
            logContainer.innerHTML = '';
            combatLogs.slice(0, 20).forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.innerHTML = `
                    <div class="log-icon"><i class="fa-solid fa-skull"></i></div>
                    <div>
                        <div style="font-weight:600;">${log.detail || log.action}</div>
                        <div style="font-size:0.8rem; color:#666;">${new Date(log.ts).toLocaleString()}</div>
                    </div>
                `;
                logContainer.appendChild(div);
            });
        }

    } catch (e) {
        console.error(e);
        document.getElementById('log-container').innerHTML = '<div class="empty-state">Failed to load battle data.</div>';
    }
});
</script>
</body>
</html>
