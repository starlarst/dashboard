<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Ghost | Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --void-black: #0a0a0f; --spectral-teal: #00f3ff; --bone-white: #e0e0e0; --glass-bg: rgba(19, 19, 31, 0.6); --glass-border: rgba(255, 255, 255, 0.08); --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--void-black); color: var(--bone-white); min-height: 100vh; display: flex; }
        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); padding: 2rem 1.5rem; position: fixed; height: 100vh; }
        .logo { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--spectral-teal); margin-bottom: 3rem; display: flex; align-items: center; gap: 10px; }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-links li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #8888a0; text-decoration: none; border-radius: 12px; transition: all 0.3s; }
        .nav-links li a:hover, .nav-links li a.active { background: rgba(0, 243, 255, 0.1); color: var(--spectral-teal); border-left: 3px solid var(--spectral-teal); }
        .main-content { flex: 1; margin-left: 260px; padding: 2rem; max-width: 800px; }
        
        .panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
        .panel h2 { font-family: 'Rajdhani'; font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 0.5rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #8888a0; font-size: 0.9rem; }
        .form-group input, .form-group textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; padding: 12px; color: white; font-family: inherit; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--spectral-teal); }
        
        .btn { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-family: 'Rajdhani'; font-size: 1.1rem; transition: all 0.2s; }
        .btn-primary { background: var(--spectral-teal); color: black; }
        .btn-primary:hover { box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .avatar-preview { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--spectral-teal); margin-bottom: 1rem; object-fit: cover; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: var(--glass-bg); border-left: 4px solid var(--spectral-teal); padding: 1rem 2rem; border-radius: 8px; transform: translateX(150%); transition: transform 0.3s; z-index: 100; }
        .toast.show { transform: translateX(0); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-ghost"></i><span>RPG Ghost</span></div>
        <ul class="nav-links">
            <li><a href="/dashboard"><i class="fa-solid fa-chart-pie"></i> Overview</a></li>
            <li><a href="/battle-log"><i class="fa-solid fa-khanda"></i> Battle Log</a></li>
            <li><a href="/inventory"><i class="fa-solid fa-sack-dollar"></i> Inventory</a></li>
            <li><a href="/quest-board"><i class="fa-solid fa-scroll"></i> Quest Board</a></li>
            <li><a href="/guild-hall"><i class="fa-solid fa-users"></i> Guild Hall</a></li>
            <li><a href="/settings" class="active"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <header style="margin-bottom: 2rem;"><h1>Account Settings</h1></header>

        <div class="panel">
            <h2><i class="fa-solid fa-user-pen" style="color:var(--spectral-teal);"></i> Profile Identity</h2>
            <img id="avatar-preview" class="avatar-preview" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Default" alt="Avatar">
            
            <div class="form-group">
                <label>Nickname</label>
                <input type="text" id="nickname" maxlength="50" placeholder="Your adventurer name">
            </div>
            <div class="form-group">
                <label>Bio</label>
                <textarea id="bio" rows="3" maxlength="500" placeholder="Tell us about your spectral journey..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Save Changes</button>
        </div>

        <div class="panel" style="border-color: rgba(239, 68, 68, 0.3);">
            <h2 style="color: var(--danger);"><i class="fa-solid fa-triangle-exclamation"></i> Danger Zone</h2>
            <p style="color:#8888a0; margin-bottom:1.5rem;">Permanently delete your account and all progress. This cannot be undone.</p>
            <button class="btn btn-danger" onclick="deleteAccount()">Delete Account</button>
        </div>
    </main>

    <div class="toast" id="toast">Saved!</div>

<script>
let currentUser = null;

document.addEventListener('DOMContentLoaded', async () => {
    // Load User & Profile
    const meRes = await fetch('/api/me');
    currentUser = await meRes.json();
    if (!currentUser.logged_in) return window.location.href = '/';

    const profRes = await fetch('/api/profile');
    const profile = await profRes.json();

    if (profile.avatar) document.getElementById('avatar-preview').src = profile.avatar;
    else if (currentUser.avatar) document.getElementById('avatar-preview').src = currentUser.avatar;
    
    if (profile.nickname) document.getElementById('nickname').value = profile.nickname;
    if (profile.bio) document.getElementById('bio').value = profile.bio;
});

async function saveProfile() {
    const nickname = document.getElementById('nickname').value.trim();
    const bio = document.getElementById('bio').value.trim();

    try {
        const res = await fetch('/api/profile', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nickname, bio })
        });
        const data = await res.json();
        if (data.ok) showToast('Profile updated successfully!');
        else showToast(data.error || 'Failed to save', true);
    } catch(e) { showToast('Server error', true); }
}

async function deleteAccount() {
    const pw = prompt("Enter your password to confirm deletion (Local accounts only):");
    if (!pw) return;

    if (!confirm("ARE YOU SURE? All data will be lost forever.")) return;

    try {
        const res = await fetch('/api/delete-account', {
            method: 'DELETE',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ password: pw })
        });
        const data = await res.json();
        if (data.ok) {
            alert("Account deleted.");
            window.location.href = '/logout';
        } else {
            alert(data.error || "Deletion failed.");
        }
    } catch(e) { alert("Server error during deletion."); }
}

function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.style.borderLeftColor = isError ? 'var(--danger)' : 'var(--spectral-teal)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
