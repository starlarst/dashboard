<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Ghost | Guild Hall</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --void-black: #0a0a0f; --spectral-teal: #00f3ff; --soul-purple: #bc13fe; --bone-white: #e0e0e0; --glass-bg: rgba(19, 19, 31, 0.6); --glass-border: rgba(255, 255, 255, 0.08); --gold: #fbbf24; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--void-black); color: var(--bone-white); min-height: 100vh; display: flex; }
        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: blur(16px); border-right: 1px solid var(--glass-border); padding: 2rem 1.5rem; position: fixed; height: 100vh; }
        .logo { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; font-weight: 700; color: var(--spectral-teal); margin-bottom: 3rem; display: flex; align-items: center; gap: 10px; }
        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-links li a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #8888a0; text-decoration: none; border-radius: 12px; transition: all 0.3s; }
        .nav-links li a:hover, .nav-links li a.active { background: rgba(0, 243, 255, 0.1); color: var(--spectral-teal); border-left: 3px solid var(--spectral-teal); }
        .main-content { flex: 1; margin-left: 260px; padding: 2rem; display: grid; grid-template-columns: 1fr 350px; gap: 2rem; }
        
        .guild-header { grid-column: 1 / -1; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 2rem; display: flex; align-items: center; gap: 2rem; margin-bottom: 1rem; }
        .guild-emblem { width: 80px; height: 80px; background: rgba(0,0,0,0.3); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: var(--gold); border: 2px solid var(--gold); }
        .guild-info h1 { font-family: 'Rajdhani', sans-serif; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .guild-stats { display: flex; gap: 2rem; color: #8888a0; }
        .guild-stats span i { color: var(--spectral-teal); margin-right: 5px; }

        .member-list { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1.5rem; }
        .member-row { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px solid var(--glass-border); }
        .member-row:last-child { border-bottom: none; }
        .role-leader { color: var(--gold); font-weight: 700; }
        .role-officer { color: var(--soul-purple); }

        .chat-panel { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 16px; display: flex; flex-direction: column; height: 600px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.8rem; }
        .chat-msg { font-size: 0.9rem; line-height: 1.4; }
        .chat-msg strong { color: var(--spectral-teal); margin-right: 5px; }
        .chat-input-area { padding: 1rem; border-top: 1px solid var(--glass-border); display: flex; gap: 0.5rem; }
        .chat-input-area input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; padding: 10px; color: white; outline: none; }
        .chat-input-area button { background: var(--spectral-teal); border: none; border-radius: 8px; width: 40px; cursor: pointer; color: black; }
        
        .no-guild { grid-column: 1 / -1; text-align: center; padding: 4rem; background: var(--glass-bg); border-radius: 20px; border: 1px dashed var(--glass-border); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo"><i class="fa-solid fa-ghost"></i><span>RPG Ghost</span></div>
        <ul class="nav-links">
            <li><a href="/dashboard"><i class="fa-solid fa-chart-pie"></i> Overview</a></li>
            <li><a href="/battle-log"><i class="fa-solid fa-khanda"></i> Battle Log</a></li>
            <li><a href="/inventory"><i class="fa-solid fa-sack-dollar"></i> Inventory</a></li>
            <li><a href="/quest-board"><i class="fa-solid fa-scroll"></i> Quest Board</a></li>
            <li><a href="/guild-hall" class="active"><i class="fa-solid fa-users"></i> Guild Hall</a></li>
            <li><a href="/settings"><i class="fa-solid fa-gear"></i> Settings</a></li>
        </ul>
    </aside>

    <main class="main-content" id="main-container">
        <div class="no-guild"><i class="fa-solid fa-spinner fa-spin"></i> Entering the Guild Hall...</div>
    </main>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const container = document.getElementById('main-container');
    
    try {
        const res = await fetch('/api/my-guild');
        const data = await res.json();

        if (!data.guild) {
            container.innerHTML = `
                <div class="no-guild">
                    <i class="fa-solid fa-door-closed" style="font-size:3rem; margin-bottom:1rem; color:#666;"></i>
                    <h2>You are not in a guild</h2>
                    <p style="color:#8888a0; margin-top:0.5rem;">Use the Discord bot to create or join a guild.</p>
                </div>`;
            return;
        }

        const g = data.guild;
        container.innerHTML = `
            <div class="guild-header">
                <div class="guild-emblem"><i class="fa-solid fa-shield"></i></div>
                <div class="guild-info">
                    <h1>${g.name}</h1>
                    <div class="guild-stats">
                        <span><i class="fa-solid fa-crown"></i> Led by ${g.leader_name || 'Unknown'}</span>
                        <span><i class="fa-solid fa-layer-group"></i> Level ${g.level}</span>
                        <span><i class="fa-solid fa-users"></i> ${g.member_count}/${g.max_members} Members</span>
                        <span><i class="fa-solid fa-coins"></i> Treasury: ${(g.treasury || 0).toLocaleString()}</span>
                    </div>
                </div>
            </div>

            <div class="member-list">
                <h3 style="margin-bottom:1rem; font-family:'Rajdhani'; font-size:1.3rem;">Guild Roster</h3>
                <div id="roster"></div>
            </div>

            <div class="chat-panel">
                <div style="padding:1rem; border-bottom:1px solid var(--glass-border); font-weight:600;">
                    <i class="fa-solid fa-comments" style="color:var(--spectral-teal); margin-right:5px;"></i> Guild Chat
                </div>
                <div class="chat-messages" id="chat-feed">
                    <div style="text-align:center; color:#666; margin-top:2rem;">Loading messages...</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="msg-input" placeholder="Type a message..." maxlength="200">
                    <button onclick="sendMsg()"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        `;

        // Render Roster
        const roster = document.getElementById('roster');
        (g.members || []).forEach(m => {
            const roleClass = m.role === 'Leader' ? 'role-leader' : m.role === 'Officer' ? 'role-officer' : '';
            const div = document.createElement('div');
            div.className = 'member-row';
            div.innerHTML = `
                <span>${m.name} <small style="color:#666;">(Lvl ${m.level})</small></span>
                <span class="${roleClass}">${m.role}</span>
            `;
            roster.appendChild(div);
        });

        // Load Chat
        loadChat();

    } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="no-guild">Failed to load guild data.</div>';
    }
});

async function loadChat() {
    try {
        const res = await fetch('/api/chat/messages');
        const data = await res.json();
        const feed = document.getElementById('chat-feed');
        feed.innerHTML = '';
        
        if (!data.messages || data.messages.length === 0) {
            feed.innerHTML = '<div style="text-align:center; color:#666; margin-top:2rem;">No messages yet. Say hello!</div>';
            return;
        }

        data.messages.forEach(m => {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<strong>${m.username}:</strong> ${m.text}`;
            feed.appendChild(div);
        });
        feed.scrollTop = feed.scrollHeight;
    } catch(e) { console.error(e); }
}

async function sendMsg() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text) return;
    
    input.value = '';
    try {
        await fetch('/api/chat/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text })
        });
        loadChat();
    } catch(e) { alert('Failed to send message'); }
}

// Auto-refresh chat every 5 seconds
setInterval(loadChat, 5000);
</script>
</body>
</html>
